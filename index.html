<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🔺 Teorema de Pitágoras</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&family=Fredoka+One&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #f8fafc;
    --surface: #ffffff;
    --panel-left: #eef4ff;
    --panel-right: #ffffff;
    --accent: #d97706;
    --accent2: #059669;
    --accent3: #2563eb;
    --red: #dc2626;
    --text: #0f172a;
    --muted: #475569;
    --border: #cbd5e1;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { width: 100%; height: 100%; overflow-x: hidden; }

  body {
    font-family: 'Nunito', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
  }

  /* HEADER */
  header {
    background: #1e3a8a;
    padding: 1rem 2.5rem;
    display: flex;
    align-items: center;
    justify-content: space-between;
    flex-shrink: 0;
    box-shadow: 0 4px 16px #00000033;
  }

  .header-left h1 {
    font-family: 'Fredoka One', cursive;
    font-size: clamp(1.8rem, 3.5vw, 3rem);
    color: #fbbf24;
    line-height: 1;
  }

  .header-left p {
    color: #93c5fd;
    font-size: clamp(0.9rem, 1.5vw, 1.2rem);
    margin-top: 0.2rem;
  }

  .formula-box {
    background: #ffffff;
    border: 3px solid #fbbf24;
    border-radius: 16px;
    padding: 0.6rem 2rem;
    font-size: clamp(1.4rem, 2.5vw, 2.2rem);
    font-weight: 900;
    letter-spacing: 3px;
    color: #1e3a8a;
  }

  .formula-box .fa { color: #d97706; }
  .formula-box .fc { color: #059669; }

  /* SCOREBOARD */
  .scoreboard {
    display: flex;
    justify-content: center;
    align-items: center;
    gap: 2rem;
    padding: 0.8rem 2rem;
    background: #ffffff;
    border-bottom: 2px solid var(--border);
    flex-shrink: 0;
    box-shadow: 0 2px 8px #00000011;
  }

  .score-pill {
    font-size: clamp(1rem, 1.8vw, 1.4rem);
    font-weight: 800;
    padding: 0.4rem 1.5rem;
    border-radius: 99px;
    border: 2.5px solid;
  }

  .score-pill.correct { border-color: var(--accent2); color: var(--accent2); background: #d1fae5; }
  .score-pill.wrong   { border-color: var(--red);     color: var(--red);     background: #fee2e2; }

  .progress-wrap { flex: 1; max-width: 400px; }

  .progress-info {
    display: flex;
    justify-content: space-between;
    font-size: clamp(0.85rem, 1.3vw, 1.1rem);
    color: var(--muted);
    margin-bottom: 0.3rem;
    font-weight: 700;
  }

  .progress-bar { background: #e2e8f0; border-radius: 99px; height: 14px; overflow: hidden; }

  .progress-fill {
    height: 100%;
    border-radius: 99px;
    background: linear-gradient(90deg, #2563eb, #059669);
    transition: width 0.5s ease;
  }

  /* MAIN */
  .main { flex: 1; display: flex; overflow: hidden; }

  /* LEFT PANEL */
  .panel-left {
    flex: 1.1;
    padding: 2rem 2.5rem;
    display: flex;
    flex-direction: column;
    justify-content: center;
    border-right: 2px solid var(--border);
    background: var(--panel-left);
  }

  .prob-header { display: flex; align-items: center; gap: 1rem; margin-bottom: 1.5rem; }

  .prob-emoji { font-size: clamp(2.5rem, 5vw, 4.5rem); line-height: 1; }

  .prob-meta { display: flex; flex-direction: column; gap: 0.4rem; }

  .badge {
    display: inline-block;
    background: #d97706;
    color: #fff;
    font-weight: 900;
    border-radius: 8px;
    padding: 0.25rem 1rem;
    font-size: clamp(0.85rem, 1.3vw, 1.15rem);
    letter-spacing: 1px;
  }

  .badge.cateto { background: var(--accent2); }

  .prob-title {
    font-size: clamp(1.4rem, 2.5vw, 2.2rem);
    font-weight: 900;
    color: var(--text);
    line-height: 1.2;
  }

  .situation-text {
    font-size: clamp(1.2rem, 2.2vw, 1.9rem);
    line-height: 1.8;
    color: #1e293b;
    margin-bottom: 1.5rem;
  }

  .situation-text strong { color: #b45309; font-size: 110%; }

  .hint-box {
    background: #dbeafe;
    border: 2px solid #93c5fd;
    border-radius: 14px;
    padding: 0.9rem 1.4rem;
    font-size: clamp(1rem, 1.7vw, 1.4rem);
    color: #1d4ed8;
    font-weight: 700;
    line-height: 1.5;
  }

  /* RIGHT PANEL */
  .panel-right {
    flex: 0.9;
    padding: 1.5rem 2rem;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    gap: 1.2rem;
    background: var(--panel-right);
  }

  .triangle-area {
    width: 100%;
    display: flex;
    justify-content: center;
    flex: 1;
    align-items: center;
  }

  svg.triangle-svg {
    filter: drop-shadow(0 4px 12px #00000018);
    width: 100%;
    max-width: 520px;
    height: auto;
  }

  /* INPUT */
  .answer-section { width: 100%; display: flex; flex-direction: column; gap: 0.9rem; }

  .input-label {
    font-size: clamp(1.1rem, 1.8vw, 1.6rem);
    font-weight: 800;
    color: var(--accent3);
    text-align: center;
  }

  .input-row { display: flex; gap: 0.8rem; align-items: center; justify-content: center; }

  .answer-input {
    flex: 1;
    max-width: 260px;
    background: #f1f5f9;
    border: 3px solid #cbd5e1;
    border-radius: 14px;
    padding: 0.9rem 1.2rem;
    font-size: clamp(1.3rem, 2.2vw, 2rem);
    font-family: 'Nunito', sans-serif;
    font-weight: 800;
    color: var(--text);
    outline: none;
    transition: border-color 0.2s, box-shadow 0.2s;
    text-align: center;
  }

  .answer-input:focus { border-color: var(--accent3); background: #fff; box-shadow: 0 0 0 4px #2563eb18; }

  .unit-badge {
    background: #e2e8f0;
    border: 2px solid #cbd5e1;
    border-radius: 10px;
    padding: 0.7rem 1.2rem;
    font-weight: 800;
    color: var(--muted);
    font-size: clamp(1.1rem, 1.8vw, 1.6rem);
  }

  .btn-check {
    background: linear-gradient(135deg, #2563eb, #4f46e5);
    color: #fff;
    font-family: 'Fredoka One', cursive;
    font-size: clamp(1.2rem, 2vw, 1.8rem);
    padding: 0.9rem 2.5rem;
    border: none;
    border-radius: 16px;
    cursor: pointer;
    transition: transform 0.15s, box-shadow 0.15s;
    box-shadow: 0 4px 20px #2563eb33;
    width: 100%;
  }

  .btn-check:hover  { transform: translateY(-2px); }
  .btn-check:active { transform: scale(0.97); }

  /* FEEDBACK */
  .feedback {
    width: 100%;
    border-radius: 14px;
    padding: 1rem 1.4rem;
    font-weight: 700;
    font-size: clamp(1rem, 1.6vw, 1.4rem);
    display: none;
    animation: pop 0.3s ease;
    line-height: 1.6;
  }

  @keyframes pop {
    0%   { transform: scale(0.9); opacity: 0; }
    60%  { transform: scale(1.03); }
    100% { transform: scale(1); opacity: 1; }
  }

  .feedback.correct { background: #dcfce7; border: 2.5px solid #16a34a; color: #14532d; display: block; }
  .feedback.wrong   { background: #fee2e2; border: 2.5px solid #dc2626; color: #7f1d1d; display: block; }
  .feedback .step   { font-weight: 600; color: #475569; font-size: 0.9em; margin-top: 0.4rem; }

  .btn-next {
    display: none;
    background: linear-gradient(135deg, #d97706, #ea580c);
    color: #fff;
    font-family: 'Fredoka One', cursive;
    font-size: clamp(1.2rem, 2vw, 1.8rem);
    padding: 0.9rem 2.5rem;
    border: none;
    border-radius: 16px;
    cursor: pointer;
    width: 100%;
    transition: transform 0.15s;
    box-shadow: 0 4px 20px #d9770633;
  }

  .btn-next:hover { transform: translateY(-2px); }

  /* COMPLETION */
  #completion-card {
    display: none;
    flex: 1;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    text-align: center;
    padding: 3rem;
    gap: 1.5rem;
    background: #f0f9ff;
  }

  #completion-card h2 {
    font-family: 'Fredoka One', cursive;
    font-size: clamp(2rem, 4vw, 3.5rem);
    color: #1e3a8a;
  }

  .final-score { font-size: clamp(3rem, 6vw, 5rem); font-weight: 900; color: var(--accent2); }

  .btn-restart {
    background: linear-gradient(135deg, #059669, #0d9488);
    color: #fff;
    font-family: 'Fredoka One', cursive;
    font-size: clamp(1.2rem, 2vw, 1.8rem);
    padding: 1rem 3rem;
    border: none;
    border-radius: 16px;
    cursor: pointer;
    box-shadow: 0 4px 20px #05966933;
    transition: transform 0.15s;
  }

  .btn-restart:hover { transform: translateY(-2px); }
</style>
</head>
<body>

<header>
  <div class="header-left">
    <h1>🔺 Teorema de Pitágoras</h1>
    <p>Situaciones reales para practicar</p>
  </div>
  <div class="formula-box">
    <span class="fa">a²</span> + <span class="fa">b²</span> = <span class="fc">c²</span>
  </div>
</header>

<div class="scoreboard">
  <div class="score-pill correct">✅ Correctas: <span id="score-correct">0</span></div>
  <div class="progress-wrap">
    <div class="progress-info">
      <span id="progress-text">Problema 1 de 6</span>
      <span id="progress-pct">0%</span>
    </div>
    <div class="progress-bar">
      <div class="progress-fill" id="progress-fill" style="width:0%"></div>
    </div>
  </div>
  <div class="score-pill wrong">❌ Errores: <span id="score-wrong">0</span></div>
</div>

<div class="main" id="main-content">
  <div class="panel-left">
    <div class="prob-header">
      <div class="prob-emoji" id="prob-emoji">🏗️</div>
      <div class="prob-meta">
        <span class="badge" id="prob-badge">HIPOTENUSA</span>
        <div class="prob-title" id="prob-title">Título</div>
      </div>
    </div>
    <p class="situation-text" id="prob-text"></p>
    <div class="hint-box" id="prob-hint"></div>
  </div>

  <div class="panel-right">
    <div class="triangle-area">
      <svg class="triangle-svg" id="triangle-svg" viewBox="0 0 400 300"></svg>
    </div>
    <div class="answer-section">
      <div class="input-label" id="input-label">¿Cuánto mide la hipotenusa?</div>
      <div class="input-row">
        <input class="answer-input" type="number" id="answer-input" placeholder="Tu respuesta" step="0.01" min="0">
        <span class="unit-badge" id="unit-badge">m</span>
      </div>
      <button class="btn-check" onclick="checkAnswer()">✓ Verificar respuesta</button>
      <div class="feedback" id="feedback"></div>
      <button class="btn-next" id="btn-next" onclick="nextProblem()">Siguiente problema →</button>
    </div>
  </div>
</div>

<div class="main" id="completion-card">
  <div style="font-size:clamp(3rem,7vw,6rem)">🎉</div>
  <h2>¡Excelente trabajo!</h2>
  <p style="color:#475569; font-size:clamp(1.1rem,2vw,1.6rem);">Completaste todos los problemas</p>
  <div class="final-score" id="final-score">0/6</div>
  <p id="final-msg" style="font-size:clamp(1.1rem,2vw,1.5rem); color:#1e293b; max-width:600px;"></p>
  <button class="btn-restart" onclick="restart()">🔄 Intentar de nuevo</button>
</div>

<script>
const problems = [
  {
    emoji:"🦅", title:"El vuelo del dron", type:"hipotenusa",
    text:`Un dron despega verticalmente <strong>6 metros</strong> desde el suelo y luego se desplaza horizontalmente <strong>8 metros</strong> hasta llegar a su destino. ¿Cuál es la distancia en línea recta entre el punto de despegue y el destino?`,
    hint:"💡 La distancia en línea recta es la hipotenusa. Catetos: altura = 6 m, desplazamiento = 8 m.",
    answer:10, unit:"m", badge:"HIPOTENUSA",
    inputLabel:"¿Cuánto mide la distancia en línea recta (hipotenusa)?",
    labels:["8 m","6 m","? m"], steps:"√(6² + 8²) = √(36 + 64) = √100 = 10 m"
  },
  {
    emoji:"🚲", title:"La rampa de ciclismo", type:"cateto",
    text:`Una rampa para bicicletas mide <strong>17 metros</strong> de largo (hipotenusa) y su base horizontal ocupa <strong>15 metros</strong> del suelo. ¿A qué altura llega la rampa en su punto más alto?`,
    hint:"💡 Debes encontrar la altura (cateto). Usa: cateto = √(hipotenusa² − cateto conocido²)",
    answer:8, unit:"m", badge:"CATETO",
    inputLabel:"¿A qué altura llega la rampa (cateto)?",
    labels:["15 m","? m","17 m"], steps:"√(17² − 15²) = √(289 − 225) = √64 = 8 m"
  },
  {
    emoji:"🌲", title:"El árbol caído", type:"cateto",
    text:`Un árbol se rompió a causa del viento. La parte caída mide <strong>13 metros</strong> (hipotenusa) y su extremo quedó a <strong>5 metros</strong> del tronco. ¿A qué altura se rompió el árbol?`,
    hint:"💡 Debes encontrar un cateto. Usa: cateto = √(hipotenusa² − cateto conocido²)",
    answer:12, unit:"m", badge:"CATETO",
    inputLabel:"¿A qué altura se rompió el árbol (cateto)?",
    labels:["5 m","? m","13 m"], steps:"√(13² − 5²) = √144 = 12 m"
  },
  {
    emoji:"🏊", title:"La piscina", type:"cateto",
    text:`Laura nada en diagonal cruzando una piscina rectangular. La diagonal mide <strong>10 metros</strong> y el ancho es <strong>6 metros</strong>. ¿Cuánto mide el largo de la piscina?`,
    hint:"💡 El largo es el cateto desconocido. Hipotenusa = 10 m, cateto conocido = 6 m.",
    answer:8, unit:"m", badge:"CATETO",
    inputLabel:"¿Cuánto mide el largo de la piscina (cateto)?",
    labels:["6 m","? m","10 m"], steps:"√(10² − 6²) = √64 = 8 m"
  },
  {
    emoji:"🏙️", title:"Entre dos edificios", type:"hipotenusa",
    text:`Se lanza una cuerda desde la cima de un edificio hasta la base del vecino. La separación horizontal es <strong>9 metros</strong> y la diferencia de alturas es <strong>12 metros</strong>. ¿Cuánto mide la cuerda?`,
    hint:"💡 Catetos: separación horizontal = 9 m, diferencia de altura = 12 m.",
    answer:15, unit:"m", badge:"HIPOTENUSA",
    inputLabel:"¿Cuánto mide la cuerda (hipotenusa)?",
    labels:["9 m","12 m","? m"], steps:"√(9² + 12²) = √225 = 15 m"
  },
  {
    emoji:"🚢", title:"El barco navegante", type:"cateto",
    text:`Un barco navega <strong>20 km al norte</strong> desde el puerto, luego continúa hacia el este. La distancia total hasta el puerto es <strong>25 km</strong>. ¿Cuántos km navegó hacia el este?`,
    hint:"💡 La distancia total (25 km) es la hipotenusa. El recorrido al norte (20 km) es un cateto.",
    answer:15, unit:"km", badge:"CATETO",
    inputLabel:"¿Cuántos km navegó hacia el este (cateto)?",
    labels:["20 km","? km","25 km"], steps:"√(25² − 20²) = √225 = 15 km"
  }
];

let current=0, correct=0, wrong=0, answered=false;

function drawTriangle(svgEl, labels) {
  svgEl.innerHTML = "";
  const W=400, H=300;
  const A={x:50, y:H-50}, B={x:W-50, y:H-50}, C={x:50, y:50};

  const poly = document.createElementNS("http://www.w3.org/2000/svg","polygon");
  poly.setAttribute("points",`${A.x},${A.y} ${B.x},${B.y} ${C.x},${C.y}`);
  poly.setAttribute("fill","#dbeafe");
  poly.setAttribute("stroke","#2563eb");
  poly.setAttribute("stroke-width","3.5");
  poly.setAttribute("stroke-linejoin","round");
  svgEl.appendChild(poly);

  const sq = document.createElementNS("http://www.w3.org/2000/svg","polyline");
  sq.setAttribute("points",`${A.x+22},${A.y} ${A.x+22},${A.y-22} ${A.x},${A.y-22}`);
  sq.setAttribute("fill","none");
  sq.setAttribute("stroke","#64748b");
  sq.setAttribute("stroke-width","2");
  svgEl.appendChild(sq);

  const labelsPos = [
    {x:(A.x+B.x)/2, y:A.y+38, anchor:"middle"},
    {x:A.x-30, y:(A.y+C.y)/2+6, anchor:"middle"},
    {x:(B.x+C.x)/2+26, y:(B.y+C.y)/2-10, anchor:"start"}
  ];

  const colors=["#b45309","#059669","#1d4ed8"];
  const bgColors=["#fef3c7","#d1fae5","#dbeafe"];

  labels.forEach((lbl,i) => {
    const isUnknown = lbl.startsWith("?");
    const approxW = lbl.length*13+20;
    const bx = labelsPos[i].anchor==="middle" ? labelsPos[i].x-approxW/2 : labelsPos[i].x-4;

    const bg = document.createElementNS("http://www.w3.org/2000/svg","rect");
    bg.setAttribute("x", bx);
    bg.setAttribute("y", labelsPos[i].y-20+2);
    bg.setAttribute("width", approxW);
    bg.setAttribute("height", 30);
    bg.setAttribute("rx","7");
    bg.setAttribute("fill", isUnknown ? "#fee2e2" : bgColors[i]);
    bg.setAttribute("stroke", isUnknown ? "#dc2626" : colors[i]);
    bg.setAttribute("stroke-width","1.5");
    svgEl.appendChild(bg);

    const txt = document.createElementNS("http://www.w3.org/2000/svg","text");
    txt.setAttribute("x", labelsPos[i].x);
    txt.setAttribute("y", labelsPos[i].y);
    txt.setAttribute("text-anchor", labelsPos[i].anchor);
    txt.setAttribute("fill", isUnknown ? "#dc2626" : colors[i]);
    txt.setAttribute("font-size","20");
    txt.setAttribute("font-weight","800");
    txt.setAttribute("font-family","Nunito, sans-serif");
    txt.textContent = lbl;
    svgEl.appendChild(txt);
  });
}

function loadProblem() {
  answered = false;
  const p = problems[current];
  document.getElementById("prob-emoji").textContent  = p.emoji;
  const badgeEl = document.getElementById("prob-badge");
  badgeEl.textContent = p.badge;
  badgeEl.className   = "badge" + (p.type==="cateto" ? " cateto" : "");
  document.getElementById("prob-title").textContent  = p.title;
  document.getElementById("prob-text").innerHTML     = p.text;
  document.getElementById("prob-hint").textContent   = p.hint;
  document.getElementById("input-label").textContent = p.inputLabel;
  document.getElementById("unit-badge").textContent  = p.unit;
  document.getElementById("answer-input").value      = "";
  document.getElementById("answer-input").disabled   = false;
  const fb = document.getElementById("feedback");
  fb.className = "feedback"; fb.style.display = "none";
  document.getElementById("btn-next").style.display = "none";
  const pct = Math.round((current/problems.length)*100);
  document.getElementById("progress-fill").style.width = pct+"%";
  document.getElementById("progress-text").textContent = `Problema ${current+1} de ${problems.length}`;
  document.getElementById("progress-pct").textContent  = pct+"%";
  drawTriangle(document.getElementById("triangle-svg"), p.labels);
  setTimeout(() => document.getElementById("answer-input").focus(), 100);
}

function checkAnswer() {
  if (answered) return;
  const p   = problems[current];
  const val = parseFloat(document.getElementById("answer-input").value);
  if (isNaN(val)||val<=0) { alert("Por favor escribe un número válido mayor que cero."); return; }
  answered = true;
  document.getElementById("answer-input").disabled = true;
  const diff = Math.abs(val-p.answer);
  const fb   = document.getElementById("feedback");
  if (diff<0.1) {
    correct++;
    document.getElementById("score-correct").textContent = correct;
    fb.className = "feedback correct";
    fb.innerHTML = `✅ ¡Correcto! La respuesta es <strong>${p.answer} ${p.unit}</strong>.<div class="step">📐 Procedimiento: ${p.steps}</div>`;
  } else {
    wrong++;
    document.getElementById("score-wrong").textContent = wrong;
    fb.className = "feedback wrong";
    fb.innerHTML = `❌ Tu respuesta: <strong>${val} ${p.unit}</strong> — Correcta: <strong>${p.answer} ${p.unit}</strong><div class="step">📐 Procedimiento: ${p.steps}</div>`;
  }
  fb.style.display = "block";
  document.getElementById("btn-next").style.display = "block";
}

function nextProblem() {
  current++;
  if (current>=problems.length) {
    document.getElementById("main-content").style.display = "none";
    document.getElementById("completion-card").style.display = "flex";
    document.getElementById("final-score").textContent = `${correct} / ${problems.length}`;
    const pct = Math.round((correct/problems.length)*100);
    document.getElementById("final-msg").textContent =
      pct===100 ? "🌟 ¡Perfecto! Dominas el teorema de Pitágoras." :
      pct>=66   ? "👏 ¡Muy bien! Sigue practicando para dominar todos los casos." :
                  "💪 Buen intento. Revisa el procedimiento y vuelve a intentarlo.";
  } else { loadProblem(); }
}

function restart() {
  current=correct=wrong=0;
  document.getElementById("score-correct").textContent = 0;
  document.getElementById("score-wrong").textContent   = 0;
  document.getElementById("completion-card").style.display = "none";
  document.getElementById("main-content").style.display   = "flex";
  loadProblem();
}

document.addEventListener("keydown", e => {
  if (e.key==="Enter") {
    if (!answered) checkAnswer();
    else if (document.getElementById("btn-next").style.display!=="none") nextProblem();
  }
});

loadProblem();
</script>
</body>
</html>
